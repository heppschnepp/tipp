version: "3.8"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tipp-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tipp-server
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_SERVER=sqlserver
      - DB_PORT=1433
      - DB_NAME=tipp
      - DB_USER=lportal
      - DB_PASSWORD=lportal
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_EXPIRES_IN=7d
      - FLAGS_DIR=/app/public/flags
      - WC2026_API_KEY=${WC2026_API_KEY:-}
    ports:
      - "3001:3001"
    depends_on:
      - sqlserver
    volumes:
      - ./client/public/flags:/app/public/flags:ro
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: tipp-client
    environment:
      - VITE_API_URL=http://server:3001
    ports:
      - "5173:5173"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  sqlserver_data:
